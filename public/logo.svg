<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a" rx="114"/>
  
  <!-- Gold square accent top-left -->
  <rect x="52" y="52" width="8" height="8" fill="#c8a96e" rx="2" opacity="0.6"/>
  <rect x="452" y="452" width="8" height="8" fill="#c8a96e" rx="2" opacity="0.6"/>

  <!-- Main AD monogram - bold, clean -->
  <text 
    x="256" y="310" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="210" 
    font-weight="700"
    fill="#c8a96e"
    text-anchor="middle"
    letter-spacing="-8"
  >AD</text>

  <!-- Thin horizontal line under text -->
  <rect x="120" y="338" width="272" height="1.5" fill="#c8a96e" opacity="0.35" rx="1"/>

  <!-- Subtitle -->
  <text 
    x="256" y="390" 
    font-family="Georgia, serif" 
    font-size="26" 
    font-weight="400"
    fill="#c8a96e"
    text-anchor="middle"
    letter-spacing="12"
    opacity="0.7"
  >DENÍK</text>
</svg>
