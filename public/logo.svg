<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1118"/>
      <stop offset="100%" style="stop-color:#1a1e2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c98e"/>
      <stop offset="100%" style="stop-color:#c8a96e"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a96e;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e8c98e"/>
      <stop offset="70%" style="stop-color:#e8c98e"/>
      <stop offset="100%" style="stop-color:#c8a96e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" fill="url(#bg)" rx="110"/>

  <!-- Thin gold border -->
  <rect x="4" y="4" width="504" height="504" fill="none" stroke="url(#goldLine)" stroke-width="1.5" rx="108" opacity="0.5"/>

  <!-- Car silhouette - minimal, elegant -->
  <!-- Car body -->
  <path d="M 90 300 L 90 280 Q 90 270 100 265 L 160 255 Q 175 230 200 218 L 290 215 Q 330 213 360 228 L 400 252 L 420 255 Q 428 258 430 268 L 432 290 L 432 310 Q 432 318 424 320 L 380 322 Q 375 300 352 295 Q 328 290 310 300 Q 295 310 292 325 L 220 325 Q 218 305 196 298 Q 172 291 155 302 Q 142 310 140 325 L 88 322 Q 82 320 82 312 Z" fill="url(#gold)" opacity="0.95"/>

  <!-- Car roof -->
  <path d="M 175 255 L 195 230 Q 205 215 225 210 L 295 208 Q 325 207 345 220 L 380 248" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>

  <!-- Windows -->
  <path d="M 195 252 L 210 228 Q 216 218 230 215 L 270 213 L 268 250 Z" fill="#c8a96e" opacity="0.2"/>
  <path d="M 275 213 L 310 214 Q 330 215 345 225 L 362 248 L 278 250 Z" fill="#c8a96e" opacity="0.2"/>

  <!-- Front wheel -->
  <circle cx="175" cy="320" r="30" fill="#0e1118" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="175" cy="320" r="16" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <circle cx="175" cy="320" r="5" fill="url(#gold)"/>

  <!-- Rear wheel -->
  <circle cx="335" cy="320" r="30" fill="#0e1118" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="335" cy="320" r="16" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <circle cx="335" cy="320" r="5" fill="url(#gold)"/>

  <!-- Headlight -->
  <path d="M 88 275 L 100 272 L 100 285 L 88 288 Z" fill="url(#gold)" opacity="0.9"/>

  <!-- Thin gold accent line under car -->
  <line x1="100" y1="358" x2="412" y2="358" stroke="url(#goldLine)" stroke-width="1" opacity="0.4"/>

  <!-- Text: AD monogram above -->
  <text x="256" y="185" font-family="Georgia, serif" font-size="42" font-weight="400" fill="url(#gold)" text-anchor="middle" letter-spacing="18" opacity="0.9">AD</text>

  <!-- Thin line under monogram -->
  <line x1="190" y1="195" x2="322" y2="195" stroke="url(#goldLine)" stroke-width="0.8" opacity="0.5"/>

  <!-- Text: AUTODENÍK below -->
  <text x="256" y="400" font-family="Georgia, serif" font-size="28" font-weight="300" fill="url(#gold)" text-anchor="middle" letter-spacing="8" opacity="0.85">AUTODENÍK</text>

  <!-- Subtle dots on sides -->
  <circle cx="80" cy="400" r="2" fill="#c8a96e" opacity="0.3"/>
  <circle cx="432" cy="400" r="2" fill="#c8a96e" opacity="0.3"/>
</svg>
